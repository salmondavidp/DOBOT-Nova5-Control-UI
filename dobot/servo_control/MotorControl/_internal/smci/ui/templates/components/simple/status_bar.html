<!-- Status Bar -->
<div class="status-bar">
    <div class="status-left">
        <span class="status-dot disconnected" id="statusDot"></span>
        <span class="status-text" id="statusText">Connecting...</span>
    </div>
    <div class="status-center">
        <img class="header-logo" src="/static/images/logo.png" alt="SMCI Logo">
    </div>
    <div class="status-right">
        <div class="license-info">
            <button class="license-link" id="licenseLink" onclick="openLicensePage()">Update License</button>
            <span class="license-badge" id="licenseBadge" role="button" tabindex="0">License: --</span>
            <div class="license-tooltip" id="licenseTooltip"></div>
        </div>
        <span class="slave-badge" id="slaveBadge"></span>
        <button class="debug-toggle-btn" id="debugToggleBtn" onclick="toggleDebugPanel()" title="Debug Panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m-7.07-3.93l4.24-4.24m5.66-5.66l4.24-4.24M1 12h6m6 0h6m-3.93 7.07l-4.24-4.24m-5.66-5.66L3.93 4.93"/>
            </svg>
        </button>
    </div>
</div>
