<div class="header">
    <div class="header-left">
        <h1>{{ page_title }}</h1>
        <div class="status">
            <span>
                <span class="status-dot disconnected" id="statusDot"></span>
                <span id="statusText">{{ status_text | default('Disconnected') }}</span>
            </span>
            <span>
                <span class="status-dot disconnected" id="wsDot"></span>
                WebSocket
            </span>
        </div>
    </div>
    {% if nav_links %}
    <div class="header-right">
        {% for link in nav_links %}
        <a class="nav-link{% if link.active %} active{% endif %}" href="{{ link.href }}">{{ link.label }}</a>
        {% endfor %}
    </div>
    {% endif %}
</div>
