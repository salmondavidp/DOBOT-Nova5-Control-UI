<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DOBOT Coffee Orders</title>
    <link rel="stylesheet" href="/coffee_orders.css">
  </head>
  <body>
    <main class="orders-shell">
      <header class="orders-header">
        <div>
          <p class="eyebrow">Coffee Database</p>
          <h1>Customer Orders</h1>
        </div>
        <div class="orders-actions">
          <button class="btn" id="refresh-button" type="button">Refresh</button>
          <button class="btn primary" id="export-button" type="button">Save Excel</button>
        </div>
      </header>

      <section class="orders-card">
        <div class="orders-summary">
          <strong id="order-count">0 orders</strong>
          <span id="orders-status">Loading...</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Drink Name</th>
                <th>Timing</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="orders-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/coffee_orders.js"></script>
  </body>
</html>
